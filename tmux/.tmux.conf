unbind r
bind r source-file ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-s

set -g mouse on

# Indexare de la 1 (nu 0)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Window name: iconita + aplicatie/folder
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#(echo " ")#{b:pane_current_path},#(~/.tmux/icon.sh #{pane_current_command})}'

# Load Nord theme
run-shell "$HOME/.tmux/themes/nord-tmux/nord.tmux"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

set-option -g status-position top

# Status bar custom (dupa Nord ca sa nu fie suprascris)
set -g status-left ""
set -g status-right "#{prefix_highlight}#[fg=brightblack,bg=black,nobold,noitalics,nounderscore]#[fg=white,bg=brightblack] %Y-%m-%d  %H:%M:%S #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]#[fg=black,bg=cyan,bold] #S #[fg=blue,bg=cyan,nobold,noitalics,nounderscore]#[fg=black,bg=blue,bold] #H 󰌽 "
set -g status-right-length 80
set -g status-interval 1

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'