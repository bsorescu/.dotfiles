# Nord theme (Linux)
run-shell "$HOME/.tmux/themes/nord-tmux/nord.tmux"

# Status bar custom (dupa Nord ca sa nu fie suprascris)
set -g status-left ""
set -g status-right "#{prefix_highlight}#[fg=brightblack,bg=black,nobold,noitalics,nounderscore]#[fg=white,bg=brightblack] %Y-%m-%d  %H:%M:%S #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]#[fg=black,bg=cyan,bold] #S #[fg=blue,bg=cyan,nobold,noitalics,nounderscore]#[fg=black,bg=blue,bold] #H 󰌽 "
set -g status-right-length 80
set -g status-interval 1
